# Hermes Agent — vendored CLI served via web terminal
# Deploy: fly deploy --config gateway/fly.toml (from repo root)
app = 'hermes-alpha'
primary_region = 'sin'

[build]
  dockerfile = "gateway/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
